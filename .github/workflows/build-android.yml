name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app (Vite)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install Android SDK platforms and build tools
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" 2>/dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true
          echo "=== Installed SDK packages ==="
          sdkmanager --list_installed 2>/dev/null | grep -E "platforms|build-tools" || true

      - name: Add Android platform
        run: |
          if [ ! -d "android" ] || [ ! -f "android/settings.gradle" ]; then
            echo "Creating Android project with Capacitor..."
            npx cap add android
          else
            echo "Android project already exists"
          fi

      - name: Verify Gradle files exist
        run: |
          echo "=== Checking Gradle files ==="
          test -f "android/build.gradle" && echo "✅ android/build.gradle exists" || echo "❌ Missing android/build.gradle"
          test -f "android/settings.gradle" && echo "✅ android/settings.gradle exists" || echo "❌ Missing android/settings.gradle"
          test -f "android/app/build.gradle" && echo "✅ android/app/build.gradle exists" || echo "❌ Missing android/app/build.gradle"
          test -f "android/variables.gradle" && echo "✅ android/variables.gradle exists" || echo "❌ Missing android/variables.gradle"
          test -f "android/gradlew" && echo "✅ android/gradlew exists" || echo "❌ Missing android/gradlew"

      - name: Restore variables.gradle with stable versions
        run: |
          cat > android/variables.gradle << 'VARS_EOF'
          ext {
              minSdkVersion = 24
              compileSdkVersion = 35
              targetSdkVersion = 35
              androidxActivityVersion = '1.9.3'
              androidxAppCompatVersion = '1.7.0'
              androidxCoordinatorLayoutVersion = '1.2.0'
              androidxCoreVersion = '1.13.1'
              androidxFragmentVersion = '1.8.5'
              coreSplashScreenVersion = '1.0.1'
              androidxWebkitVersion = '1.12.1'
              junitVersion = '4.13.2'
              androidxJunitVersion = '1.2.1'
              androidxEspressoCoreVersion = '3.6.1'
              cordovaAndroidVersion = '14.0.1'
          }
          VARS_EOF
          echo "✅ variables.gradle restored"
          cat android/variables.gradle

      - name: Restore root build.gradle
        run: |
          cat > android/build.gradle << 'GRADLE_EOF'
          plugins {
              id 'com.android.application' version '8.7.3' apply false
              id 'com.google.gms.google-services' version '4.4.2' apply false
          }

          apply from: "variables.gradle"

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          GRADLE_EOF
          echo "✅ root build.gradle restored"

      - name: Verify Android structure
        run: |
          echo "=== Android directory structure ==="
          ls -la android/ || echo "No android directory"
          echo "=== Build files present ==="
          find android -maxdepth 2 -name "*.gradle" -type f 2>/dev/null | sort || echo "No gradle files found"

      - name: Generate app icons from resources
        run: npx @capacitor/assets generate --android --iconBackgroundColor '#0f172a' --iconBackgroundColorDark '#0f172a' --splashBackgroundColor '#0f172a' --splashBackgroundColorDark '#0f172a' 2>/dev/null || true
        continue-on-error: true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: |
          chmod +x android/gradlew
          ls -la android/gradlew

      - name: Verify Gradle wrapper
        working-directory: android
        run: ./gradlew --version

      - name: Clean Gradle cache
        working-directory: android
        run: ./gradlew clean --no-daemon

      - name: Build Debug APK
        working-directory: android
        run: |
          set -o pipefail
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --info \
            2>&1 | tee /tmp/gradle-build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== GRADLE BUILD FAILED ==="
            tail -500 /tmp/gradle-build.log
            exit $BUILD_EXIT
          fi
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g -Dorg.gradle.configureondemand=false"
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Find APK file
        run: |
          echo "=== Searching for APK files ==="
          find android -type f -name "*.apk" 2>/dev/null || echo "No APK found"
          echo "=== Full build outputs ==="
          find android/app/build/outputs -type d 2>/dev/null | head -30 || echo "No outputs directory"

      - name: Verify APK exists and set path
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ APK not found at: $APK_PATH"
            echo "=== Gradle build log (last 300 lines) ==="
            tail -300 /tmp/gradle-build.log || cat /tmp/gradle-build.log
            exit 1
          fi
          
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "✅ APK found: $APK_PATH ($APK_SIZE)"
          echo "APK_FILE=$APK_PATH" >> $GITHUB_ENV

      - name: Prepare APK for upload
        run: |
          mkdir -p output
          cp "${{ env.APK_FILE }}" "output/UnNoted-Android-debug-v${{ github.run_number }}.apk"
          echo "✅ APK prepared for upload"
          ls -lh output/

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnNoted-Android-debug-${{ github.run_number }}
          path: output/UnNoted-Android-debug-v${{ github.run_number }}.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-release.log
        continue-on-error: true
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload Release APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: UnNoted-Android-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
        continue-on-error: true

      - name: Upload Gradle logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs-${{ github.run_number }}
          path: |
            /tmp/gradle-build.log
            /tmp/gradle-release.log
          retention-days: 7
        continue-on-error: true

      - name: Send APK to Telegram (Success)
        if: success()
        continue-on-error: true
        run: |
          APK_PATH="output/UnNoted-Android-debug-v${{ github.run_number }}.apk"
          CAPTION="📱 *UnNoted - Android APK*%0A%0A✅ Build %23${{ github.run_number }} مكتمل%0A🌿 Branch: ${{ github.ref_name }}%0A📝 Commit: \`${{ github.sha }}\`"
          
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F "document=@${APK_PATH}" \
            -F "caption=${CAPTION}" \
            -F "parse_mode=Markdown" || true

      - name: Send Failure Notification to Telegram
        if: failure()
        continue-on-error: true
        run: |
          TEXT="❌ فشل بناء Android APK في Build %23${{ github.run_number }}%0A%0ARepository: ${{ github.repository }}%0ABranch: ${{ github.ref_name }}%0A%0ADetails: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${TEXT}" \
            -d "parse_mode=Markdown" || true
