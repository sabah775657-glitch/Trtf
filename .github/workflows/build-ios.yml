name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --ignore-engines

      - name: Build web app (Vite only)
        run: npx vite build
        env:
          NODE_ENV: production

      - name: Add iOS platform (if not present)
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Generate app icons from resources
        run: npx @capacitor/assets generate --ios --iconBackgroundColor '#0f172a' --iconBackgroundColorDark '#0f172a' --splashBackgroundColor '#0f172a' --splashBackgroundColorDark '#0f172a'
        continue-on-error: true

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Update iOS deployment target to 14.0
        working-directory: ios/App
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' App.xcodeproj/project.pbxproj || true

      - name: Build iOS app (no signing)
        working-directory: ios/App
        run: |
          xcodebuild \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.unnoted.smartnotebook \
            build 2>&1 | tail -50

      - name: Package IPA (unsigned)
        run: |
          mkdir -p output/Payload
          APP_PATH=$(find ios/App/DerivedData -name "App.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" output/Payload/UnNoted.app
          cd output
          zip -r UnNoted-iOS-unsigned-v${{ github.run_number }}.ipa Payload
          ls -lh *.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnNoted-iOS-unsigned-${{ github.run_number }}
          path: output/UnNoted-iOS-unsigned-v${{ github.run_number }}.ipa
          retention-days: 30

      - name: Send IPA to Telegram
        if: success()
        continue-on-error: true
        run: |
          IPA_PATH="output/UnNoted-iOS-unsigned-v${{ github.run_number }}.ipa"
          CAPTION="🍎 *UnNoted - iOS IPA (Unsigned)*%0A%0A✅ Build %23${{ github.run_number }} مكتمل%0A🌿 Branch: ${{ github.ref_name }}%0A📝 Commit: ${{ github.sha }}%0A%0A⚠️ هذا ملف IPA غير موقع. لتثبيته استخدم AltStore أو Sideloadly على جهازك."
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F "document=@${IPA_PATH}" \
            -F "caption=${CAPTION}" \
            -F "parse_mode=Markdown"

      - name: Notify on failure
        if: failure()
        continue-on-error: true
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=❌ فشل بناء iOS IPA في Build %23${{ github.run_number }}%0A%0Ahttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "parse_mode=Markdown"
